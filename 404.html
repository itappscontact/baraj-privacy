<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sayfa bulunamadı — Baraj</title>
<style>
  :root{--bg:#0B0F14;--text:#E6EDF3;--muted:#8B96A5;--primary:#60A5FA}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    display:flex;align-items:center;justify-content:center;text-align:center}
  .wrap{padding:24px;max-width:480px}
  h1{font-size:64px;margin:0 0 8px;letter-spacing:-0.03em}
  p{color:var(--muted);font-size:17px;line-height:1.6;margin:0 0 24px}
  a{color:var(--primary);text-decoration:none;font-weight:600}
  a:hover{text-decoration:underline}
  @media (prefers-color-scheme: light){
    :root{--bg:#FFFFFF;--text:#0B0F14;--muted:#5C6675;--primary:#3B82F6}
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>404</h1>
  <p>Aradığın sayfa burada yok.<br>Belki gizlilik politikasını arıyordun?</p>
  <a href="/">Gizlilik Politikası'na dön →</a>
</div>
</body>
</html>
